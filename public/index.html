<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Cenas - Éttore Decor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1B2833 0%, #0a0f14 100%);
            color: #F8F4E6;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #276F50, #EE5F38);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #F8F4E6;
            opacity: 0.7;
            font-size: 1rem;
        }

        .api-key-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(248, 244, 230, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .api-key-section input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(248, 244, 230, 0.2);
            border-radius: 8px;
            color: #F8F4E6;
            font-size: 0.95rem;
            margin-top: 10px;
        }

        .api-key-section input::placeholder {
            color: rgba(248, 244, 230, 0.4);
        }

        .form-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(248, 244, 230, 0.1);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #F8F4E6;
            font-size: 0.95rem;
        }

        .upload-area {
            border: 2px dashed rgba(39, 111, 80, 0.5);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(39, 111, 80, 0.05);
        }

        .upload-area:hover {
            border-color: #276F50;
            background: rgba(39, 111, 80, 0.1);
        }

        .upload-area.drag-over {
            border-color: #EE5F38;
            background: rgba(238, 95, 56, 0.1);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            opacity: 0.6;
        }

        input[type="file"] {
            display: none;
        }

        select, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(248, 244, 230, 0.2);
            border-radius: 8px;
            color: #F8F4E6;
            font-size: 0.95rem;
            font-family: inherit;
        }

        select option {
            background: #1B2833;
            color: #F8F4E6;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        .radio-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .radio-option {
            flex: 1;
            min-width: 80px;
        }

        .radio-option input[type="radio"] {
            display: none;
        }

        .radio-option label {
            display: block;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(248, 244, 230, 0.2);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .radio-option input[type="radio"]:checked + label {
            background: #276F50;
            border-color: #276F50;
        }

        .generate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #276F50, #EE5F38);
            border: none;
            border-radius: 12px;
            color: #F8F4E6;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(39, 111, 80, 0.4);
        }

        .generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .preview-section {
            margin-top: 30px;
        }

        .image-preview {
            width: 100%;
            max-width: 300px;
            height: auto;
            border-radius: 8px;
            margin-top: 10px;
            border: 2px solid rgba(39, 111, 80, 0.3);
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(248, 244, 230, 0.1);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }

        .result-card img {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .result-card .angulo-label {
            font-size: 0.85rem;
            color: #EE5F38;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .download-btn {
            padding: 10px 20px;
            background: #276F50;
            border: none;
            border-radius: 8px;
            color: #F8F4E6;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            background: #1f5a40;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #EE5F38;
        }

        .spinner {
            border: 3px solid rgba(248, 244, 230, 0.1);
            border-top: 3px solid #EE5F38;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(238, 95, 56, 0.1);
            border: 1px solid #EE5F38;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            color: #EE5F38;
        }

        .success-message {
            background: rgba(39, 111, 80, 0.1);
            border: 1px solid #276F50;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            color: #276F50;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏮 Gerador de Cenas</h1>
            <p class="subtitle">Éttore Decor - Product Scene Generator</p>
        </header>

        <div class="api-key-section">
            <label>🔑 API Key fal.ai</label>
            <input 
                type="password" 
                id="apiKey" 
                placeholder="Cole sua API key aqui (será salva no navegador)"
            >
        </div>

        <div class="form-section">
            <div class="form-group">
                <label>📸 Upload da Luminária</label>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📷</div>
                    <p>Clique ou arraste a foto da luminária</p>
                    <p style="font-size: 0.85rem; opacity: 0.6; margin-top: 5px;">
                        (PNG ou JPG - fundo branco/estúdio)
                    </p>
                </div>
                <input type="file" id="imageInput" accept="image/*">
                <div class="preview-section" id="previewSection" style="display: none;">
                    <img id="imagePreview" class="image-preview">
                </div>
            </div>

            <div class="form-group">
                <label>🏠 Tipo de Ambiente</label>
                <select id="ambiente">
                    <option value="Sala de estar">Sala de estar</option>
                    <option value="Quarto">Quarto</option>
                    <option value="Banheiro">Banheiro</option>
                    <option value="Cozinha">Cozinha</option>
                    <option value="Home office">Home office</option>
                    <option value="Varanda">Varanda/Área externa</option>
                    <option value="Hall">Hall de entrada</option>
                    <option value="Sala de jantar">Sala de jantar</option>
                </select>
            </div>

            <div class="form-group">
                <label>💡 Iluminação da Cena</label>
                <select id="iluminacao">
                    <option value="Dia">Dia (luz natural - luminária apagada)</option>
                    <option value="Noite">Noite (luminária acesa)</option>
                    <option value="Crepusculo/golden hour">Crepúsculo/Golden hour (apagada)</option>
                    <option value="Luz ambiente suave">Luz ambiente suave (acesa)</option>
                </select>
            </div>

            <div class="form-group">
                <label>🎯 Foco na Luminária</label>
                <select id="foco">
                    <option value="Produto em destaque">Produto em destaque (foco nítido)</option>
                    <option value="Integrado ao ambiente">Integrado ao ambiente (tudo em foco)</option>
                    <option value="Plano de fundo">Plano de fundo (luminária ao fundo)</option>
                </select>
            </div>

            <div class="form-group">
                <label>🎨 Estilo do Ambiente</label>
                <select id="estilo">
                    <option value="Minimalista">Minimalista/Escandinavo</option>
                    <option value="Industrial">Industrial/Loft</option>
                    <option value="Boho">Boho/Natural</option>
                    <option value="Contemporaneo">Contemporâneo Clean</option>
                    <option value="Aconchegante">Aconchegante/Hygge</option>
                </select>
            </div>

            <div class="form-group">
                <label>🎬 Cena/Ação (opcional)</label>
                <textarea 
                    id="cena" 
                    placeholder="Ex: pessoa lendo livro no sofá, casal tomando café, vazio (sem pessoas)..."
                ></textarea>
                <p style="font-size: 0.85rem; opacity: 0.6; margin-top: 5px;">
                    Sugestões: pessoa lendo, tomando café, trabalhando no laptop, criança brincando, gato dormindo, vazio
                </p>
            </div>

            <div class="form-group">
                <label>📐 Variações de Ângulo</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="var1" name="variacoes" value="1" checked>
                        <label for="var1">1 imagem</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="var3" name="variacoes" value="3">
                        <label for="var3">3 ângulos</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="var5" name="variacoes" value="5">
                        <label for="var5">5 ângulos</label>
                    </div>
                </div>
            </div>

            <button class="generate-btn" id="generateBtn" onclick="generateScenes()">
                🚀 Gerar Imagens
            </button>
        </div>

        <div id="loadingSection" style="display: none;">
            <div class="loading">
                <div class="spinner"></div>
                <p>Gerando suas imagens...</p>
                <p style="font-size: 0.9rem; opacity: 0.7; margin-top: 10px;">
                    Isso pode levar alguns minutos
                </p>
            </div>
        </div>

        <div id="resultsSection"></div>
    </div>

    <script>
        const apiKeyInput = document.getElementById('apiKey');
        const uploadArea = document.getElementById('uploadArea');
        const imageInput = document.getElementById('imageInput');
        const previewSection = document.getElementById('previewSection');
        const imagePreview = document.getElementById('imagePreview');

        const savedApiKey = localStorage.getItem('falai_api_key');
        if (savedApiKey) {
            apiKeyInput.value = savedApiKey;
        }

        apiKeyInput.addEventListener('change', () => {
            localStorage.setItem('falai_api_key', apiKeyInput.value);
        });

        uploadArea.addEventListener('click', () => imageInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                imageInput.files = e.dataTransfer.files;
                showPreview(file);
            }
        });

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                showPreview(file);
            }
        });

        function showPreview(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                previewSection.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        async function generateScenes() {
            const apiKey = apiKeyInput.value.trim();
            const imageFile = imageInput.files[0];
            const ambiente = document.getElementById('ambiente').value;
            const iluminacao = document.getElementById('iluminacao').value;
            const foco = document.getElementById('foco').value;
            const estilo = document.getElementById('estilo').value;
            const cena = document.getElementById('cena').value;
            const variacoes = document.querySelector('input[name="variacoes"]:checked').value;

            if (!apiKey) {
                alert('Por favor, insira sua API key do fal.ai');
                return;
            }

            if (!imageFile) {
                alert('Por favor, faça upload da foto da luminária');
                return;
            }

            const generateBtn = document.getElementById('generateBtn');
            const loadingSection = document.getElementById('loadingSection');
            const resultsSection = document.getElementById('resultsSection');

            generateBtn.disabled = true;
            loadingSection.style.display = 'block';
            resultsSection.innerHTML = '';

            const formData = new FormData();
            formData.append('image', imageFile);
            formData.append('ambiente', ambiente);
            formData.append('iluminacao', iluminacao);
            formData.append('foco', foco);
            formData.append('estilo', estilo);
            formData.append('cena', cena);
            formData.append('variacoes', variacoes);
            formData.append('apiKey', apiKey);

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Erro ao gerar imagens');
                }

                displayResults(data);

            } catch (error) {
                resultsSection.innerHTML = `
                    <div class="error-message">
                        ❌ Erro: ${error.message}
                    </div>
                `;
            } finally {
                generateBtn.disabled = false;
                loadingSection.style.display = 'none';
            }
        }

        function displayResults(data) {
            const resultsSection = document.getElementById('resultsSection');
            
            let html = '<div class="success-message">✅ Imagens geradas com sucesso!</div>';
            html += '<div class="results-grid">';

            data.images.forEach((img, index) => {
                html += `
                    <div class="result-card">
                        <div class="angulo-label">Ângulo ${img.index}: ${img.angulo}</div>
                        <img src="${img.url}" alt="Resultado ${index + 1}">
                        <button class="download-btn" onclick="downloadImage('${img.url}', 'ettore-scene-${img.index}.jpg')">
                            📥 Download
                        </button>
                    </div>
                `;
            });

            html += '</div>';
            resultsSection.innerHTML = html;
        }

        async function downloadImage(url, filename) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
            } catch (error) {
                alert('Erro ao baixar imagem: ' + error.message);
            }
        }
    </script>
</body>
</html>
